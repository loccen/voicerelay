<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101315" />
    <title>跨屏输入</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #101315;
        --fg: #f4f7f5;
        --muted: #94a39b;
        --ok: #52d273;
        --warn: #ffca59;
        --bad: #ff6b6b;
        --button: #2488ff;
        --surface: rgba(244, 247, 245, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--bg);
      }

      body {
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      [hidden] {
        display: none !important;
      }

      input {
        width: 100vw;
        height: 100dvh;
        min-height: 100vh;
        display: block;
        border: 0;
        outline: 0;
        padding: max(22px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right))
          max(22px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        background: radial-gradient(circle at 20% 0%, rgba(82, 210, 115, 0.12), transparent 34%),
          var(--bg);
        color: var(--fg);
        caret-color: var(--ok);
        font: 20px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      textarea {
        width: 100%;
        min-height: 3.6em;
        max-height: var(--text-max-height, 60dvh);
        display: block;
        border: 0;
        outline: 0;
        resize: none;
        overflow-y: hidden;
        padding: 16px 14px;
        border-radius: 12px;
        background: var(--surface);
        color: var(--fg);
        caret-color: var(--ok);
        font: 20px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      input {
        font-size: 24px;
      }

      textarea::placeholder,
      input::placeholder {
        color: var(--muted);
      }

      body[data-state="syncing"] textarea,
      body[data-state="syncing"] input {
        box-shadow: inset 0 0 0 3px var(--warn);
      }

      body[data-state="ok"] textarea,
      body[data-state="ok"] input {
        box-shadow: inset 0 0 0 3px var(--ok);
      }

      body[data-state="error"] textarea,
      body[data-state="error"] input {
        box-shadow: inset 0 0 0 3px var(--bad);
      }

      .sendButton {
        width: 100%;
        height: 56px;
        border: 0;
        border-radius: 12px;
        background: var(--button);
        color: #fff;
        font: 600 18px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        box-shadow: 0 10px 28px rgba(36, 136, 255, 0.35);
      }

      .sendButton:active {
        transform: translateY(1px);
      }

      .modeControl {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        height: 44px;
        padding: 4px;
        border-radius: 12px;
        background: var(--surface);
      }

      .modeButton {
        min-width: 0;
        border: 0;
        border-radius: 9px;
        background: transparent;
        color: var(--muted);
        font: 600 16px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .modeButton[aria-pressed="true"] {
        background: rgba(244, 247, 245, 0.16);
        color: var(--fg);
      }

      .historyPanel {
        max-height: min(168px, 24dvh);
        overflow-y: auto;
        border-radius: 12px;
        background: var(--surface);
      }

      .statsPanel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        overflow: hidden;
        border-radius: 12px;
        background: var(--surface);
      }

      .statItem {
        min-width: 0;
        padding: 10px 12px;
      }

      .statLabel {
        color: var(--muted);
        font: 600 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .statValue {
        margin-top: 6px;
        color: var(--fg);
        font: 700 17px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .historyTitle {
        padding: 10px 12px 4px;
        color: var(--muted);
        font: 600 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .historyList {
        display: grid;
        gap: 1px;
      }

      .historyItem {
        width: 100%;
        min-height: 42px;
        border: 0;
        padding: 10px 12px;
        background: transparent;
        color: var(--fg);
        font: 15px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .historyItem:active {
        background: rgba(244, 247, 245, 0.12);
      }

      .inputPanel {
        width: 100vw;
        height: 100dvh;
        min-height: 100vh;
        padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right))
          max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        background: radial-gradient(circle at 20% 0%, rgba(82, 210, 115, 0.12), transparent 34%),
          var(--bg);
      }

      .inputStack {
        display: flex;
        max-height: 100%;
        flex-direction: column;
        gap: 12px;
      }
    </style>
  </head>
  <body data-state="idle">
    <form id="authForm" hidden>
      <input
        id="authPassword"
        autocomplete="current-password"
        inputmode="text"
        placeholder="认证密码"
        type="password"
      />
    </form>

    <section class="inputPanel" id="inputPanel" hidden>
      <div class="inputStack">
        <div class="modeControl" role="group" aria-label="输入模式">
          <button class="modeButton" id="realtimeModeButton" type="button" aria-pressed="true">实时同步</button>
          <button class="modeButton" id="sendModeButton" type="button" aria-pressed="false">发送模式</button>
        </div>

        <textarea
          id="voiceText"
          autocomplete="off"
          autocapitalize="sentences"
          spellcheck="true"
          inputmode="text"
          placeholder="在这里输入或使用语音输入"
        ></textarea>

        <button class="sendButton" id="sendButton" type="button">发送</button>

        <section class="statsPanel" id="statsPanel">
          <div class="statItem">
            <div class="statLabel">本次字数</div>
            <div class="statValue" id="currentChars">0</div>
          </div>
          <div class="statItem">
            <div class="statLabel">本次耗时</div>
            <div class="statValue" id="currentInputTime">0 秒</div>
          </div>
          <div class="statItem">
            <div class="statLabel">累计字数</div>
            <div class="statValue" id="sentChars">0</div>
          </div>
          <div class="statItem">
            <div class="statLabel" id="savedTimeLabel">累计节省</div>
            <div class="statValue" id="savedTime">0 秒</div>
          </div>
        </section>

        <section class="historyPanel" id="historyPanel" aria-label="发送历史" hidden>
          <div class="historyTitle">发送历史</div>
          <div class="historyList" id="historyList"></div>
        </section>
      </div>
    </section>

    <script>
      const textarea = document.querySelector("#voiceText");
      const authForm = document.querySelector("#authForm");
      const authPassword = document.querySelector("#authPassword");
      const sendButton = document.querySelector("#sendButton");
      const inputPanel = document.querySelector("#inputPanel");
      const realtimeModeButton = document.querySelector("#realtimeModeButton");
      const sendModeButton = document.querySelector("#sendModeButton");
      const historyPanel = document.querySelector("#historyPanel");
      const historyList = document.querySelector("#historyList");
      const statsPanel = document.querySelector("#statsPanel");
      const currentChars = document.querySelector("#currentChars");
      const currentInputTime = document.querySelector("#currentInputTime");
      const sentChars = document.querySelector("#sentChars");
      const savedTimeLabel = document.querySelector("#savedTimeLabel");
      const savedTime = document.querySelector("#savedTime");

      const historyKey = "voiceRelaySendHistory";
      const statsKey = "voiceRelaySendStats";
      const maxHistoryItems = 12;
      const defaultTypingCharsPerMinute = 60;

      let revision = 0;
      let timer = 0;
      let sending = false;
      let dirtyWhileSending = false;
      let composing = false;
      let inputMode = localStorage.getItem("voiceRelayInputMode") === "send" ? "send" : "realtime";
      let draftTimer = 0;
      let inputStartedAt = 0;
      let inputEndedAt = 0;
      let typingCharsPerMinute = defaultTypingCharsPerMinute;

      function setState(state) {
        document.body.dataset.state = state;
      }

      function showInput() {
        authForm.hidden = true;
        inputPanel.hidden = false;
        updateModeControl();
        loadServerData();
        resizeTextarea();
        textarea.focus();
      }

      function showAuth() {
        inputPanel.hidden = true;
        authForm.hidden = false;
        authPassword.focus();
      }

      function resizeTextarea() {
        if (inputPanel.hidden) return;
        const panelStyle = getComputedStyle(inputPanel);
        const verticalPadding =
          parseFloat(panelStyle.paddingTop) + parseFloat(panelStyle.paddingBottom);
        const buttonHeight = sendButton.offsetHeight || 56;
        const modeHeight = realtimeModeButton.parentElement.offsetHeight || 44;
        const statsHeight = statsPanel.offsetHeight || 58;
        const historyHeight = historyPanel.hidden ? 0 : historyPanel.offsetHeight;
        const gap = historyPanel.hidden ? 36 : 48;
        const bottomReserve = 16;
        const maxHeight = Math.max(
          72,
          window.innerHeight -
            verticalPadding -
            buttonHeight -
            modeHeight -
            statsHeight -
            historyHeight -
            gap -
            bottomReserve,
        );

        textarea.style.setProperty("--text-max-height", `${maxHeight}px`);
        textarea.style.height = "auto";
        const nextHeight = Math.min(textarea.scrollHeight, maxHeight);
        textarea.style.height = `${nextHeight}px`;
        textarea.style.overflowY = textarea.scrollHeight > maxHeight ? "auto" : "hidden";
      }

      async function checkAuth() {
        try {
          const response = await fetch("/api/auth/status", { cache: "no-store" });
          const data = await response.json();
          if (data.authenticated) {
            showInput();
          } else {
            showAuth();
          }
        } catch {
          showAuth();
          setState("error");
        }
      }

      async function login(password) {
        setState("syncing");
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ password }),
        });

        if (!response.ok) {
          setState("error");
          authPassword.select();
          return;
        }

        authPassword.value = "";
        setState("ok");
        showInput();
        window.setTimeout(() => setState("idle"), 450);
      }

      async function postText() {
        return postToEndpoint("/api/sync");
      }

      async function submitText() {
        if (sending) return;
        window.clearTimeout(timer);
        window.clearTimeout(draftTimer);
        const textAtSubmit = textarea.value;
        addHistoryItem(textAtSubmit);
        const result = await postToEndpoint("/api/submit");
        if (!result || textarea.value !== textAtSubmit) return;

        applyRelayData(result);
        textarea.value = "";
        resetInputTiming();
        resizeTextarea();
        textarea.focus();
      }

      async function postToEndpoint(endpoint) {
        if (sending) {
          dirtyWhileSending = true;
          return;
        }

        sending = true;
        dirtyWhileSending = false;
        setState("syncing");

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              "content-type": "application/json",
            },
            body: JSON.stringify({
              text: textarea.value,
              revision: ++revision,
              mode: inputMode,
              inputDurationMs: currentInputDurationMs(),
            }),
          });

          if (!response.ok) {
            if (response.status === 401) showAuth();
            throw new Error(`HTTP ${response.status}`);
          }

          setState("ok");
          window.setTimeout(() => {
            if (document.body.dataset.state === "ok") setState("idle");
          }, 450);
          const data = await response.json();
          applyRelayData(data);
          return data;
        } catch {
          setState("error");
          return false;
        } finally {
          sending = false;
          if (dirtyWhileSending && inputMode === "realtime") schedulePost(80);
        }
      }

      async function postDraft() {
        try {
          const response = await fetch("/api/draft", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              text: textarea.value,
              inputDurationMs: currentInputDurationMs(),
            }),
          });
          if (response.ok) applyRelayData(await response.json());
          if (response.status === 401) showAuth();
        } catch {}
      }

      function schedulePost(delay = 180) {
        if (inputMode !== "realtime") return;
        if (composing) return;
        window.clearTimeout(timer);
        timer = window.setTimeout(postText, delay);
      }

      function scheduleDraft(delay = 600) {
        if (inputMode !== "send") return;
        window.clearTimeout(draftTimer);
        draftTimer = window.setTimeout(postDraft, delay);
      }

      function updateModeControl() {
        const realtime = inputMode === "realtime";
        realtimeModeButton.setAttribute("aria-pressed", realtime ? "true" : "false");
        sendModeButton.setAttribute("aria-pressed", realtime ? "false" : "true");
      }

      function setInputMode(mode) {
        inputMode = mode;
        localStorage.setItem("voiceRelayInputMode", inputMode);
        window.clearTimeout(timer);
        updateModeControl();
        textarea.focus();
      }

      async function loadServerData() {
        try {
          const response = await fetch("/api/history", { cache: "no-store" });
          if (!response.ok) {
            if (response.status === 401) showAuth();
            return;
          }
          applyRelayData(await response.json());
        } catch {
          renderStats();
          renderHistory();
        }
      }

      function applyRelayData(data) {
        if (!data || data.ok === false) return;
        if (Number.isFinite(data.typingCharsPerMinute)) {
          typingCharsPerMinute = data.typingCharsPerMinute;
        }
        if (Array.isArray(data.history)) {
          saveHistory(data.history);
        }
        if (data.stats) {
          saveStats(data.stats);
        }
        renderStats(data.currentInput);
        renderHistory();
      }

      function loadHistory() {
        try {
          const parsed = JSON.parse(localStorage.getItem(historyKey) || "[]");
          return Array.isArray(parsed) ? parsed.filter((item) => typeof item === "string") : [];
        } catch {
          return [];
        }
      }

      function saveHistory(history) {
        localStorage.setItem(historyKey, JSON.stringify(history.slice(0, maxHistoryItems)));
      }

      function historyPreview(text) {
        return text.replace(/\s+/g, " ").trim() || "空白内容";
      }

      function renderHistory() {
        const history = loadHistory();
        historyPanel.hidden = history.length === 0;
        historyList.replaceChildren();

        for (const text of history) {
          const item = document.createElement("button");
          item.className = "historyItem";
          item.type = "button";
          item.textContent = historyPreview(text);
          item.addEventListener("click", () => {
            textarea.value = text;
            resetInputTiming();
            resizeTextarea();
            renderStats();
            textarea.focus();
            schedulePost(0);
            scheduleDraft(0);
          });
          historyList.append(item);
        }

        resizeTextarea();
      }

      function addHistoryItem(text) {
        if (!text) return;
        const history = loadHistory().filter((item) => item !== text);
        history.unshift(text);
        saveHistory(history);
        renderHistory();
      }

      function loadStats() {
        try {
          const parsed = JSON.parse(localStorage.getItem(statsKey) || "{}");
          return {
            sentChars: Number.isFinite(parsed.sentChars) ? parsed.sentChars : 0,
            actualInputMs: Number.isFinite(parsed.actualInputMs) ? parsed.actualInputMs : 0,
            manualInputMs: Number.isFinite(parsed.manualInputMs) ? parsed.manualInputMs : 0,
            savedMs: Number.isFinite(parsed.savedMs) ? parsed.savedMs : 0,
          };
        } catch {
          return { sentChars: 0, actualInputMs: 0, manualInputMs: 0, savedMs: 0 };
        }
      }

      function saveStats(stats) {
        localStorage.setItem(statsKey, JSON.stringify(stats));
      }

      function formatDuration(ms) {
        const seconds = Math.max(0, Math.round(ms / 1000));
        if (seconds < 60) return `${seconds} 秒`;
        const minutes = seconds / 60;
        if (minutes < 60) return `${Math.round(minutes)} 分钟`;
        const hours = minutes / 60;
        return `${hours.toFixed(hours < 10 ? 1 : 0)} 小时`;
      }

      function renderStats(serverCurrentInput) {
        const stats = loadStats();
        const current = serverCurrentInput || currentInputMetrics();
        currentChars.textContent = current.chars.toLocaleString("zh-CN");
        currentInputTime.textContent = formatDuration(current.actualInputMs);
        sentChars.textContent = stats.sentChars.toLocaleString("zh-CN");
        savedTimeLabel.textContent = `累计节省(${typingCharsPerMinute}字/分)`;
        savedTime.textContent = formatDuration(stats.savedMs);
        resizeTextarea();
      }

      function currentInputDurationMs() {
        if (!inputStartedAt || !inputEndedAt) return 0;
        return Math.max(0, inputEndedAt - inputStartedAt);
      }

      function currentInputMetrics() {
        const chars = textarea.value.length;
        const actualInputMs = currentInputDurationMs();
        const manualInputMs = typingCharsPerMinute > 0 ? (chars / typingCharsPerMinute) * 60_000 : 0;
        return {
          chars,
          actualInputMs,
          manualInputMs,
          savedMs: Math.max(0, manualInputMs - actualInputMs),
        };
      }

      function resetInputTiming() {
        inputStartedAt = 0;
        inputEndedAt = 0;
      }

      function updateInputTiming() {
        const now = Date.now();
        if (!textarea.value) {
          resetInputTiming();
          return;
        }
        if (!inputStartedAt) inputStartedAt = now;
        inputEndedAt = now;
      }

      textarea.addEventListener("compositionstart", () => {
        composing = true;
      });

      textarea.addEventListener("compositionend", () => {
        composing = false;
        updateInputTiming();
        renderStats();
        scheduleDraft(0);
        schedulePost(60);
      });

      textarea.addEventListener("input", () => {
        updateInputTiming();
        resizeTextarea();
        renderStats();
        scheduleDraft();
        schedulePost();
      });

      realtimeModeButton.addEventListener("click", () => {
        setInputMode("realtime");
        schedulePost(0);
      });

      sendModeButton.addEventListener("click", () => {
        setInputMode("send");
      });

      sendButton.addEventListener("click", () => {
        submitText();
      });

      authForm.addEventListener("submit", (event) => {
        event.preventDefault();
        login(authPassword.value);
      });

      authPassword.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        event.preventDefault();
        login(authPassword.value);
      });

      window.addEventListener("pageshow", () => {
        renderStats();
        renderHistory();
        checkAuth();
      });

      window.addEventListener("resize", () => {
        resizeTextarea();
      });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {});
      }
    </script>
  </body>
</html>
